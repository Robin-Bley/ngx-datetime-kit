name: Publish to npm

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build library (production)
        run: npm run build

      - name: Run tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless

      - name: Publish to npm
        run: npm publish ./dist/ngx-datetime-kit --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Required GitHub Secret: NPM_TOKEN
          # Create at: https://www.npmjs.com/settings/YOUR_USERNAME/tokens
          # Add to repo: Settings → Secrets → Actions → New repository secret

